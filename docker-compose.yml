version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dlmetrix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dlmetrix
      POSTGRES_PASSWORD: dlmetrix_secret
      POSTGRES_DB: dlmetrix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlmetrix -d dlmetrix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dlmetrix_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass dlmetrix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dlmetrix_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dlmetrix_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dlmetrix.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
